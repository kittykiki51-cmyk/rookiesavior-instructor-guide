<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老師專案管理 Web 版</title>
  <style>
    :root{
      --bg:#f4f7fb;--surface:#fff;--surface2:#f8fafc;--border:#d9e2ec;--text:#1e293b;--muted:#64748b;
      --primary:#2563eb;--primary2:#1d4ed8;--soft:#eaf1ff;--green:#15803d;--greenSoft:#eaf7ee;
      --red:#b91c1c;--redSoft:#fdecec;--amber:#b45309;--amberSoft:#fff4de;--gray:#eef2f6;
      --font:16px;--radius:14px;--shadow:0 8px 30px rgba(15,23,42,.06);
    }
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;font-size:var(--font)}
    button,input,textarea,select{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:var(--surface);border-right:1px solid var(--border);padding:22px 16px;position:sticky;top:0;height:100vh;overflow:auto}.brand{font-weight:800;font-size:22px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:24px}.nav button{width:100%;border:0;background:transparent;text-align:left;padding:12px 14px;border-radius:10px;margin:4px 0;color:var(--text)}.nav button.active{background:var(--soft);color:var(--primary);font-weight:700}.main{padding:22px;min-width:0}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.title{font-size:28px;font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--border);background:var(--surface);padding:9px 13px;border-radius:10px;color:var(--text)}.btn:hover{background:var(--gray)}.btn.primary{background:var(--primary);border-color:var(--primary);color:white}.btn.primary:hover{background:var(--primary2)}.btn.danger{background:var(--redSoft);border-color:var(--redSoft);color:var(--red)}.btn.small{padding:6px 9px;font-size:13px;border-radius:8px}.grid{display:grid;gap:14px}.grid.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}.cardTitle{font-weight:800;font-size:18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 9px;font-size:12px;background:var(--gray);color:var(--muted);white-space:nowrap}.pill.green{background:var(--greenSoft);color:var(--green);font-weight:700}.pill.blue{background:var(--soft);color:var(--primary);font-weight:700}.pill.red{background:var(--redSoft);color:var(--red);font-weight:700}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.between{display:flex;align-items:center;justify-content:space-between;gap:12px}.field{display:grid;gap:6px;margin:10px 0}.field label{font-size:13px;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;background:white;padding:10px 12px;color:var(--text)}textarea{min-height:90px;resize:vertical}.searchbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.searchbar input{max-width:360px}.projectCard{display:grid;gap:10px}.projectCard.done .pname{color:#94a3b8}.pname{font-weight:800;font-size:18px;line-height:1.4}.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}.list{display:grid;gap:8px}.item{border:1px solid var(--border);background:var(--surface2);border-radius:12px;padding:10px}.item.done{opacity:.65}.taskMain{font-weight:700;white-space:pre-wrap;word-break:break-word}.linkish{color:var(--primary);text-decoration:none;cursor:pointer}.linkish:hover{text-decoration:underline}.todoGroup{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--surface2);margin-bottom:10px}.todoItem{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed #e2e8f0}.todoItem:last-child{border-bottom:0}.todoItem input[type="checkbox"]{width:auto}.todoText{flex:1;word-break:break-word}.comment{border-left:4px solid var(--primary);background:var(--surface2);padding:10px 12px;border-radius:8px;margin:8px 0}.comment time{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.calendarWrap{display:grid;grid-template-columns:minmax(470px,1fr) minmax(360px,.85fr);gap:14px}.calendarWrap.full{display:block}.calendarWrap.full .monthPanel{display:none}.calHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.dow{text-align:center;color:var(--muted);font-weight:700;font-size:13px;padding:8px}.day{min-height:110px;border:1px solid var(--border);background:var(--surface2);border-radius:12px;padding:8px;display:flex;flex-direction:column;gap:4px}.day.blank{background:#f1f5f9;border-style:dashed}.day.today{outline:2px solid var(--primary)}.dayNum{font-weight:800}.miniTask{font-size:12px;color:var(--primary);background:white;border:1px solid #dbeafe;border-radius:8px;padding:3px 5px;line-height:1.3}.taskPanel .item{position:relative}.taskPanel.full .taskMain{font-size:15px}.taskPanel.full .projectName{white-space:pre-wrap;word-break:break-word}.batchBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:10px;border:1px solid var(--border);border-radius:12px;background:var(--surface2)}.hidden{display:none!important}.modalBack{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}.modal{width:min(760px,100%);max-height:90vh;overflow:auto;background:white;border-radius:18px;border:1px solid var(--border);box-shadow:0 20px 70px rgba(15,23,42,.2);padding:18px}.modal h3{margin:0 0 10px}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:white;padding:12px 16px;border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:60}.empty{border:1px dashed var(--border);border-radius:14px;padding:24px;text-align:center;color:var(--muted);background:var(--surface)}.homeHero{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.stat{font-size:30px;font-weight:900}.collapseNote{font-size:13px;color:var(--muted)}
    @media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{display:flex;overflow:auto}.nav button{white-space:nowrap}.grid.cols3,.grid.cols2,.split,.calendarWrap,.homeHero{grid-template-columns:1fr}.main{padding:14px}.top{align-items:flex-start;flex-direction:column}.day{min-height:88px}.calendarWrap.full{display:block}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">老師專案管理</div>
    <div class="sub">Web 本地資料版 v1</div>
    <div class="nav" id="nav"></div>
    <div class="sub" style="margin-top:24px">資料只會保存在你的瀏覽器內。記得定期匯出備份。</div>
  </aside>
  <main class="main">
    <div class="top">
      <div class="title" id="pageTitle">營運首頁</div>
      <div class="actions" id="topActions"></div>
    </div>
    <div id="view"></div>
  </main>
</div>
<div id="modalRoot"></div><div id="toast" class="toast hidden"></div>
<script>
const DB_NAME='teacher_project_manager_web_v1', STORE='state';
const PAGES=[['home','營運首頁'],['projects','課程專案'],['calendar','工作月曆'],['mywork','我的工作'],['settings','更多設定']];
const STAGES=['講師資料','課綱與合約','課程錄製','影片後製','課程上架','已完成'];
const ROLES=['未設定','正式','候補','下月準備','觀察'];
const MODES=['錄播','直播'];
const STATUSES=['未完成','等待中','已完成'];
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const pad=n=>String(n).padStart(2,'0');
const fmtNow=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`};
const monthKey=(d=new Date())=>`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
const ymLabel=ym=>{const [y,m]=ym.split('-');return `${Number(m)} 月 ${y}`};
const escapeHtml=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const short=(s,n=12)=>{s=String(s||''); return s.length>n?s.slice(0,n)+'…':s};
const parseDate=s=>s?new Date(s+'T00:00:00'):null;
const isDoneProject=p=>p.completed||p.stage==='已完成'||p.archived;
let state={version:'web-v1',settings:{monthlyGoal:2,fontScale:100,calendarCollapsed:false,calendarFilter:'全部',projectFilter:'全部'},projects:[],tasks:[],templates:[]};
let current='home', selectedProjectId=null, calDate=new Date(), selectedDate=today(), undoStack=[];

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function dbGet(){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).get('data');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function dbSet(data){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(data,'data');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function save(){state.updatedAt=new Date().toISOString();await dbSet(state);}
function toast(msg, undo){const el=document.getElementById('toast');el.innerHTML=escapeHtml(msg)+(undo?'　<button class="btn small" style="margin-left:8px" onclick="doUndo()">復原</button>':'');el.classList.remove('hidden');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.add('hidden'),4500);if(undo) undoStack.push(undo)}
async function doUndo(){const u=undoStack.pop();if(u){u();await save();render();toast('已復原')}}
function setPage(p){current=p;selectedProjectId=null;render();}
function setFontScale(v){state.settings.fontScale=Number(v);document.documentElement.style.setProperty('--font',`${16*state.settings.fontScale/100}px`);save();}
function project(id){return state.projects.find(p=>p.id===id)}
function tasksForProject(id){return state.tasks.filter(t=>t.projectId===id)}
function activeTasksForProject(id){return tasksForProject(id).filter(t=>t.status!=='已完成').sort(taskSort)}
function taskSort(a,b){return (a.date||'9999-99-99').localeCompare(b.date||'9999-99-99')||(a.time||'').localeCompare(b.time||'')}
function nextTask(p){return activeTasksForProject(p.id)[0]}
function importantTasks(){return state.tasks.filter(t=>t.status!=='已完成').sort(taskSort)}
function projectsSorted(){return [...state.projects].sort((a,b)=>Number(isDoneProject(a))-Number(isDoneProject(b)) || (a.targetMonth||'9999-99').localeCompare(b.targetMonth||'9999-99') || (a.targetDate||'9999-99-99').localeCompare(b.targetDate||'9999-99-99') || (a.course||'').localeCompare(b.course||''));}

function migrateImported(raw){
  if(raw && raw.projects && raw.tasks) return {...state,...raw,settings:{...state.settings,...(raw.settings||{})}};
  if(raw && raw.categories){
    const ns={version:'web-v1',settings:{...state.settings},projects:[],tasks:[],templates:raw.todo_templates||raw.templates||[]};
    for(const cat of raw.categories||[]) for(const op of cat.projects||[]){
      const parts=String(op.name||'').split('-');
      const teacher=(parts.length>1?parts[parts.length-1]:'').replace(/[（）()].*$/,'').trim() || '未填老師';
      const course=parts.length>1?parts.slice(0,-1).join('-').replace(/^\d+\/\d+[^】]*】?/,'').trim():op.name||'未命名課程';
      const p={id:op.id||uid(),teacher,course,mode:op.mode==='live'?'直播':'錄播',role:'未設定',stage:'講師資料',completed:false,targetMonth:'',targetDate:'',cloudLink:'',courseLink:'',cooperationStatus:'順利',todos:[],comments:[],history:op.history||[]};
      const running=(op.stages||[]).find(s=>s.status==='進行中')||(op.stages||[]).slice(-1)[0]; if(running) p.stage=stageFromName(running.name);
      const link=(op.stages||[]).find(s=>s.link)?.link||op.link||''; p.cloudLink=link;
      for(const sec of op.todo_sections||[]) p.todos.push({id:sec.id||uid(),name:sec.name||'檢查清單',items:(sec.items||[]).map(it=>({id:it.id||uid(),title:it.title||'',done:!!it.done,taskId:null}))});
      for(const st of op.stages||[]) for(const sub of st.subtasks||[]) ns.tasks.push({id:sub.id||uid(),projectId:p.id,title:sub.title||'未命名工作',date:sub.date_str||'',time:normalizeTime(sub.remind_time||''),status:sub.status==='已完成'?'已完成':(sub.status==='等待中'?'等待中':'未完成'),todoItemId:null,createdAt:new Date().toISOString()});
      ns.projects.push(p);
    }
    return ns;
  }
  throw new Error('無法辨識資料格式');
}
function stageFromName(n){n=String(n||'');if(n.includes('已完成')||n.includes('上架完成'))return '已完成';if(n.includes('上架'))return '課程上架';if(n.includes('剪')||n.includes('字幕')||n.includes('後製'))return '影片後製';if(n.includes('錄'))return '課程錄製';if(n.includes('課綱')||n.includes('合約')||n.includes('簽'))return '課綱與合約';return '講師資料'}
function normalizeTime(t){t=String(t||'').replace(':','').trim();if(/^\d{3,4}$/.test(t)) return t.padStart(4,'0').slice(0,2)+':'+t.padStart(4,'0').slice(2);return t}

function render(){document.documentElement.style.setProperty('--font',`${16*(state.settings.fontScale||100)/100}px`);renderNav();document.getElementById('pageTitle').textContent=PAGES.find(x=>x[0]===current)?.[1]||'專案';const view=document.getElementById('view'), actions=document.getElementById('topActions');actions.innerHTML='';
  if(current==='home') renderHome(view,actions); if(current==='projects') renderProjects(view,actions); if(current==='calendar') renderCalendar(view,actions); if(current==='mywork') renderMyWork(view,actions); if(current==='settings') renderSettings(view,actions);
}
function renderNav(){document.getElementById('nav').innerHTML=PAGES.map(([id,name])=>`<button class="${current===id?'active':''}" onclick="setPage('${id}')">${name}</button>`).join('')}

function renderHome(view,actions){actions.innerHTML='<button class="btn primary" onclick="openProjectModal()">新增專案</button><button class="btn" onclick="setPage(\'calendar\')">打開工作月曆</button>';const ym=monthKey();const formal=state.projects.filter(p=>!isDoneProject(p)&&p.role==='正式'&&(p.targetMonth===ym||!p.targetMonth));const backup=state.projects.filter(p=>!isDoneProject(p)&&p.role==='候補');const doneThisMonth=state.projects.filter(p=>isDoneProject(p)&&String(p.completedAt||'').startsWith(ym)).length;view.innerHTML=`
  <div class="homeHero"><div class="card"><div class="muted">本月目標</div><div class="stat">${state.settings.monthlyGoal||2}</div></div><div class="card"><div class="muted">本月已完成</div><div class="stat">${doneThisMonth}</div></div><div class="card"><div class="muted">本月正式</div><div class="stat">${formal.length}</div></div><div class="card"><div class="muted">候補課程</div><div class="stat">${backup.length}</div></div></div>
  <div class="grid cols2" style="margin-top:14px"><div class="card"><div class="cardTitle">本月正式課程</div>${projectListBrief(formal)}</div><div class="card"><div class="cardTitle">候補課程</div>${projectListBrief(backup)}</div></div>
  <div class="card" style="margin-top:14px"><div class="cardTitle">未來月份規劃</div>${pipelineBrief()}</div>`}
function projectListBrief(list){if(!list.length)return '<div class="empty">尚未設定</div>';return `<div class="list">${list.map(p=>`<div class="item"><div class="between"><div><div class="taskMain linkish" onclick="openProject('${p.id}')">${escapeHtml(p.course)}</div><div class="muted">${escapeHtml(p.teacher)}｜${p.mode}｜${p.stage}</div></div>${doneBadge(p)}</div></div>`).join('')}</div>`}
function pipelineBrief(){const groups={};for(const p of state.projects.filter(p=>!isDoneProject(p))){const m=p.targetMonth||'未設定';groups[m]=(groups[m]||0)+1}return Object.entries(groups).sort().map(([m,c])=>`<span class="pill blue">${escapeHtml(m==='未設定'?m:ymLabel(m))}：${c} 門</span>`).join(' ')||'<span class="muted">尚未有未來月份資料</span>'}
function doneBadge(p){return isDoneProject(p)?'<span class="pill green">已完成｜此專案結束</span>':''}

function renderProjects(view,actions){actions.innerHTML='<button class="btn primary" onclick="openProjectModal()">新增專案</button>'; if(selectedProjectId){renderProjectDetail(view,project(selectedProjectId)); return}
  view.innerHTML=`<div class="searchbar"><input id="projectSearch" placeholder="搜尋老師、課程" oninput="render()" value="${escapeHtml(window.projectSearch||'')}"><select id="modeFilter" onchange="render()"><option>全部</option>${MODES.map(m=>`<option ${window.modeFilter===m?'selected':''}>${m}</option>`)}</select><select id="roleFilter" onchange="render()"><option>全部角色</option>${ROLES.map(r=>`<option ${window.roleFilter===r?'selected':''}>${r}</option>`)}</select></div><div class="grid cols2" id="projectCards"></div>`;
  document.getElementById('projectSearch').oninput=e=>{window.projectSearch=e.target.value;render()};document.getElementById('modeFilter').onchange=e=>{window.modeFilter=e.target.value;render()};document.getElementById('roleFilter').onchange=e=>{window.roleFilter=e.target.value;render()};
  const q=(window.projectSearch||'').toLowerCase();let list=projectsSorted().filter(p=>(!q||`${p.teacher}${p.course}`.toLowerCase().includes(q))&&(!window.modeFilter||window.modeFilter==='全部'||p.mode===window.modeFilter)&&(!window.roleFilter||window.roleFilter==='全部角色'||p.role===window.roleFilter));
  document.getElementById('projectCards').innerHTML=list.map(p=>projectCard(p)).join('')||'<div class="empty">目前沒有專案</div>';
}
function projectCard(p){const nt=nextTask(p);return `<div class="card projectCard ${isDoneProject(p)?'done':''}"><div class="between"><div class="pname linkish" onclick="openProject('${p.id}')">${escapeHtml(p.course)}</div>${doneBadge(p)}</div><div class="meta"><span>${escapeHtml(p.teacher)}</span><span>${p.mode}</span><span>${p.role}</span><span>${p.stage}</span>${p.cooperationStatus&&p.cooperationStatus!=='順利'?`<span class="pill red">${p.cooperationStatus}</span>`:''}</div><div class="muted">下一步：${nt?`${escapeHtml(nt.date||'未排日期')} ${escapeHtml(nt.time||'')}｜${escapeHtml(nt.title)}`:'尚未建立工作排程'}</div><div class="row"><button class="btn small" onclick="openProject('${p.id}')">開啟</button><button class="btn small" onclick="openProjectModal('${p.id}')">編輯</button></div></div>`}
function openProject(id){selectedProjectId=id;current='projects';render()}
function renderProjectDetail(view,p){if(!p){selectedProjectId=null;render();return} document.getElementById('topActions').innerHTML='<button class="btn" onclick="selectedProjectId=null;render()">返回列表</button><button class="btn" onclick="openProjectModal(\''+p.id+'\')">編輯專案</button><button class="btn primary" onclick="openTaskModal(null,\''+p.id+'\')">新增工作</button>';
 const nt=nextTask(p);view.innerHTML=`<div class="grid"><div class="card"><div class="between"><div><div class="pname ${isDoneProject(p)?'muted':''}">${escapeHtml(p.course)}</div><div class="meta"><span>${escapeHtml(p.teacher)}</span><span>${p.mode}</span><span>${p.role}</span><span>${p.stage}</span>${p.targetDate?`<span>目標：${p.targetDate}</span>`:''}</div></div>${doneBadge(p)}</div><div style="margin-top:12px" class="row">${p.cloudLink?`<a class="btn small" target="_blank" href="${escapeHtml(p.cloudLink)}">雲端資料夾</a>`:''}${p.courseLink?`<a class="btn small" target="_blank" href="${escapeHtml(p.courseLink)}">課程頁</a>`:''}</div></div>
 <div class="card"><div class="cardTitle">下一步</div>${nt?taskItem(nt,{project:false,select:false}):'<div class="empty">尚未建立工作排程</div>'}</div>
 <div class="split"><div class="card"><div class="cardTitle">工作排程 <button class="btn small primary" onclick="openTaskModal(null,\''+p.id+'\')">新增</button></div>${taskListHtml(tasksForProject(p.id))}</div><div class="card"><div class="cardTitle">檢查清單 <span class="row"><button class="btn small" onclick="importTemplate(\''+p.id+'\')">匯入範本</button><button class="btn small" onclick="saveTemplate(\''+p.id+'\')">儲存為範本</button><button class="btn small primary" onclick="addTodoGroup(\''+p.id+'\')">新增清單</button></span></div>${todoHtml(p)}</div></div>
 <div class="card"><div class="cardTitle">留言板</div><textarea id="commentText" placeholder="手動輸入目前狀況、老師回覆、補充事項……"></textarea><div class="row" style="margin-top:8px"><button class="btn primary" onclick="addComment(\''+p.id+'\')">新增留言</button></div><div id="comments">${commentHtml(p)}</div></div>
 <div class="card"><div class="cardTitle">重要紀錄</div>${historyHtml(p)}</div></div>`}
function taskListHtml(tasks){const pending=tasks.filter(t=>t.status!=='已完成').sort(taskSort), done=tasks.filter(t=>t.status==='已完成').sort(taskSort).reverse();return `<div class="list">${pending.map(t=>taskItem(t,{select:false})).join('')||'<div class="empty">沒有未完成工作</div>'}</div><details style="margin-top:12px"><summary class="muted">已完成 ${done.length} 件</summary><div class="list" style="margin-top:8px">${done.map(t=>taskItem(t,{select:false})).join('')}</div></details>`}
function taskItem(t,opt={}){const p=project(t.projectId);const sel=opt.select?`<input type="checkbox" onchange="toggleBatch('${t.id}',this.checked)">`:'';return `<div class="item ${t.status==='已完成'?'done':''}"><div class="between"><div style="min-width:0">${sel}<div class="taskMain linkish" onclick="${p?`openProject('${p.id}')`:'openTaskModal(\''+t.id+'\')'}">${escapeHtml(t.title)}</div>${opt.project!==false?`<div class="muted projectName">${p?escapeHtml(p.course):'我的工作'}</div>`:''}<div class="muted">${escapeHtml(t.date||'未排日期')} ${escapeHtml(t.time||'')}｜${t.status}</div></div><div class="row">${t.status!=='已完成'?`<button class="btn small" onclick="completeTask('${t.id}')">完成</button><button class="btn small" onclick="postponeTask('${t.id}',1)">明天</button><button class="btn small" onclick="postponeTask('${t.id}',3)">+3天</button>`:''}<button class="btn small" onclick="openTaskModal('${t.id}')">編輯</button><button class="btn small danger" onclick="deleteTask('${t.id}')">刪除</button></div></div></div>`}
function todoHtml(p){return (p.todos||[]).map(g=>`<div class="todoGroup"><div class="between"><b>${escapeHtml(g.name)}</b><div class="row"><button class="btn small" onclick="renameTodoGroup('${p.id}','${g.id}')">重新命名</button><button class="btn small" onclick="addTodoItem('${p.id}','${g.id}')">＋子項目</button><button class="btn small danger" onclick="deleteTodoGroup('${p.id}','${g.id}')">刪除清單</button></div></div>${(g.items||[]).map(it=>`<div class="todoItem"><input type="checkbox" ${it.done?'checked':''} onchange="toggleTodo('${p.id}','${g.id}','${it.id}',this.checked)"><span class="todoText" contenteditable="true" onblur="editTodoText('${p.id}','${g.id}','${it.id}',this.textContent)">${escapeHtml(it.title)}</span><button class="btn small" onclick="scheduleTodo('${p.id}','${g.id}','${it.id}')">${it.taskId?taskScheduleLabel(it.taskId):'排程'}</button><button class="btn small danger" onclick="deleteTodoItem('${p.id}','${g.id}','${it.id}')">刪除</button></div>`).join('')}</div>`).join('')||'<div class="empty">尚未建立檢查清單</div>'}
function taskScheduleLabel(id){const t=state.tasks.find(x=>x.id===id);return t?`已排程 ${t.date||''}`:'排程'}
function commentHtml(p){return (p.comments||[]).slice().sort((a,b)=>String(b.time).localeCompare(String(a.time))).map(c=>`<div class="comment"><time>${escapeHtml(c.time)}</time><div>${escapeHtml(c.text).replace(/\n/g,'<br>')}</div><button class="btn small danger" style="margin-top:6px" onclick="deleteComment('${p.id}','${c.id}')">刪除</button></div>`).join('')||'<div class="empty">尚未有留言</div>'}
function historyHtml(p){const h=(p.history||[]).slice(-20).reverse();return h.map(x=>`<div class="muted" style="padding:4px 0">${escapeHtml(x.time||'')}　${escapeHtml(x.msg||x.text||'')}</div>`).join('')||'<div class="empty">尚未有紀錄</div>'}

function renderCalendar(view,actions){actions.innerHTML='<button class="btn" onclick="state.settings.calendarCollapsed=!state.settings.calendarCollapsed;save();render()">'+(state.settings.calendarCollapsed?'顯示月曆':'收起月曆')+'</button><button class="btn primary" onclick="openTaskModal()">新增工作</button><button class="btn" onclick="todayClose()">今日收尾</button>';
 const y=calDate.getFullYear(),m=calDate.getMonth(); const first=new Date(y,m,1), last=new Date(y,m+1,0); let start=(first.getDay()+6)%7; let days=[]; for(let i=0;i<start;i++)days.push(null); for(let d=1;d<=last.getDate();d++)days.push(new Date(y,m,d)); while(days.length%7)days.push(null);
 view.innerHTML=`<div class="card"><div class="row"><select id="calFilter" onchange="state.settings.calendarFilter=this.value;save();render()">${['全部','今天','逾期','等待中','未完成','已完成'].map(f=>`<option ${state.settings.calendarFilter===f?'selected':''}>${f}</option>`)}</select><select id="calProject" onchange="state.settings.projectFilter=this.value;save();render()"><option>全部專案</option><option ${state.settings.projectFilter==='我的工作'?'selected':''}>我的工作</option>${state.projects.map(p=>`<option value="${p.id}" ${state.settings.projectFilter===p.id?'selected':''}>${escapeHtml(short(p.course,28))}</option>`)}</select><span class="muted">選取日期：${selectedDate}</span></div></div><div class="calendarWrap ${state.settings.calendarCollapsed?'full':''}" style="margin-top:14px"><div class="card monthPanel"><div class="calHeader"><button class="btn small" onclick="calDate=new Date(${y},${m-1},1);render()">上個月</button><div class="cardTitle" style="margin:0">${y} 年 ${m+1} 月</div><button class="btn small" onclick="calDate=new Date(${y},${m+1},1);render()">下個月</button></div><div class="calGrid">${['一','二','三','四','五','六','日'].map(d=>`<div class="dow">${d}</div>`).join('')}${days.map(d=>dayCell(d)).join('')}</div></div><div class="card taskPanel ${state.settings.calendarCollapsed?'full':''}"><div class="cardTitle">${selectedDate} 工作</div>${batchBar()}<div class="list">${filteredTasks().map(t=>taskItem(t,{select:state.settings.calendarCollapsed})).join('')||'<div class="empty">沒有符合條件的工作</div>'}</div></div></div>`}
function dayCell(d){if(!d)return '<div class="day blank"></div>';const ds=d.toISOString().slice(0,10);const tasks=state.tasks.filter(t=>t.date===ds);return `<div class="day ${ds===today()?'today':''}" onclick="selectedDate='${ds}';render()"><div class="dayNum">${d.getDate()}</div>${tasks.slice(0,3).map(t=>`<div class="miniTask">${escapeHtml(short(t.title,9))}</div>`).join('')}${tasks.length>3?`<div class="miniTask muted">另有 ${tasks.length-3} 件</div>`:''}</div>`}
function filteredTasks(){let list=[...state.tasks];const f=state.settings.calendarFilter||'全部', pf=state.settings.projectFilter||'全部專案'; if(f==='今天')list=list.filter(t=>t.date===today()); if(f==='逾期')list=list.filter(t=>t.status!=='已完成'&&t.date&&t.date<today()); if(f==='等待中')list=list.filter(t=>t.status==='等待中'); if(f==='未完成')list=list.filter(t=>t.status!=='已完成'); if(f==='已完成')list=list.filter(t=>t.status==='已完成'); if(f==='全部') list=list.filter(t=>!selectedDate||t.date===selectedDate); if(pf==='我的工作')list=list.filter(t=>!t.projectId); else if(pf!=='全部專案')list=list.filter(t=>t.projectId===pf); return list.sort(taskSort)}
let batchSelected=new Set();function toggleBatch(id,on){on?batchSelected.add(id):batchSelected.delete(id);renderBatchCount()}function renderBatchCount(){const el=document.getElementById('batchCount');if(el)el.textContent=batchSelected.size}
function batchBar(){return state.settings.calendarCollapsed?`<div class="batchBar"><b>已選 <span id="batchCount">${batchSelected.size}</span></b><button class="btn small" onclick="batchComplete()">完成</button><button class="btn small" onclick="batchPostpone(1)">明天</button><button class="btn small" onclick="batchPostpone(3)">+3天</button><button class="btn small" onclick="batchWaiting()">等待老師</button><button class="btn small danger" onclick="batchDelete()">刪除</button></div>`:''}

function renderMyWork(view,actions){actions.innerHTML='<button class="btn primary" onclick="openTaskModal(null,null)">新增我的工作</button>';view.innerHTML=`<div class="card"><div class="cardTitle">我的工作</div>${taskListHtml(state.tasks.filter(t=>!t.projectId))}</div>`}
function renderSettings(view,actions){actions.innerHTML='';view.innerHTML=`<div class="grid cols2"><div class="card"><div class="cardTitle">資料匯入／匯出</div><div class="field"><label>上傳桌面版或網頁版 JSON</label><input type="file" accept=".json" onchange="importFile(this.files[0])"></div><button class="btn primary" onclick="exportJson()">匯出 JSON 備份</button><button class="btn danger" onclick="clearData()">清空瀏覽器資料</button><p class="muted">目前資料：${state.projects.length} 專案、${state.tasks.length} 工作。</p></div><div class="card"><div class="cardTitle">顯示設定</div><div class="field"><label>字體大小 ${state.settings.fontScale||100}%</label><input type="range" min="90" max="150" value="${state.settings.fontScale||100}" oninput="setFontScale(this.value)"></div><div class="field"><label>本月目標</label><input type="number" value="${state.settings.monthlyGoal||2}" onchange="state.settings.monthlyGoal=Number(this.value);save();render()"></div></div><div class="card"><div class="cardTitle">使用說明</div><p>第一次使用請先匯入桌面版 JSON 備份。之後網頁會自動保存到瀏覽器內部資料庫。</p><p class="muted">目前版本不會上傳到外部伺服器，也無法直接同步 Apple 提醒事項。</p></div></div>`}

function openProjectModal(id){const p=id?project(id):{teacher:'',course:'',mode:'錄播',role:'未設定',stage:'講師資料',targetMonth:monthKey(),targetDate:'',cloudLink:'',courseLink:'',cooperationStatus:'順利'};modal(`<h3>${id?'編輯專案':'新增專案'}</h3><div class="grid cols2"><div class="field"><label>老師</label><input id="mTeacher" value="${escapeHtml(p.teacher)}"></div><div class="field"><label>課程名稱</label><input id="mCourse" value="${escapeHtml(p.course)}"></div><div class="field"><label>錄播／直播</label><select id="mMode">${MODES.map(x=>`<option ${p.mode===x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>本月角色</label><select id="mRole">${ROLES.map(x=>`<option ${p.role===x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>目前階段</label><select id="mStage">${STAGES.map(x=>`<option ${p.stage===x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>目標月份</label><input id="mTargetMonth" type="month" value="${escapeHtml(p.targetMonth||'')}"></div><div class="field"><label>目標日期</label><input id="mTargetDate" type="date" value="${escapeHtml(p.targetDate||'')}"></div><div class="field"><label>合作狀態</label><select id="mCoop">${['順利','需觀察','暫緩'].map(x=>`<option ${p.cooperationStatus===x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>雲端資料夾</label><input id="mCloud" value="${escapeHtml(p.cloudLink||'')}"></div><div class="field"><label>課程頁</label><input id="mLink" value="${escapeHtml(p.courseLink||'')}"></div></div><div class="row" style="margin-top:14px"><button class="btn primary" onclick="saveProjectModal('${id||''}')">儲存</button><button class="btn" onclick="closeModal()">取消</button></div>`)}
async function saveProjectModal(id){const data={teacher:v('mTeacher'),course:v('mCourse'),mode:v('mMode'),role:v('mRole'),stage:v('mStage'),targetMonth:v('mTargetMonth'),targetDate:v('mTargetDate'),cooperationStatus:v('mCoop'),cloudLink:v('mCloud'),courseLink:v('mLink')}; if(id){Object.assign(project(id),data);const p=project(id);p.completed=p.stage==='已完成';if(p.completed&&!p.completedAt)p.completedAt=today();if(!p.completed)p.completedAt='';addHistory(p,'編輯專案')}else{state.projects.push({id:uid(),...data,completed:data.stage==='已完成',completedAt:data.stage==='已完成'?today():'',todos:[],comments:[],history:[{time:fmtNow(),msg:'建立專案'}]})}closeModal();await save();render();toast('已儲存')}
function openTaskModal(id,projectId){const t=id?state.tasks.find(x=>x.id===id):{projectId:projectId||'',title:'',date:selectedDate||today(),time:'',status:'未完成'};modal(`<h3>${id?'編輯工作':'新增工作'}</h3><div class="field"><label>所屬專案</label><select id="tProject"><option value="">我的工作</option>${state.projects.map(p=>`<option value="${p.id}" ${t.projectId===p.id?'selected':''}>${escapeHtml(short(p.course,42))}</option>`)}</select></div><div class="field"><label>工作內容</label><input id="tTitle" value="${escapeHtml(t.title||'')}"></div><div class="grid cols2"><div class="field"><label>日期</label><input id="tDate" type="date" value="${escapeHtml(t.date||'')}"></div><div class="field"><label>時間</label><input id="tTime" type="time" value="${escapeHtml(t.time||'')}"></div></div><div class="field"><label>狀態</label><select id="tStatus">${STATUSES.map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`)}</select></div><div class="row" style="margin-top:14px"><button class="btn primary" onclick="saveTaskModal('${id||''}')">儲存</button><button class="btn" onclick="closeModal()">取消</button></div>`)}
async function saveTaskModal(id){const data={projectId:v('tProject')||null,title:v('tTitle'),date:v('tDate'),time:v('tTime'),status:v('tStatus')}; if(!data.title){toast('請輸入工作內容');return} if(id){Object.assign(state.tasks.find(t=>t.id===id),data)}else state.tasks.push({id:uid(),...data,createdAt:new Date().toISOString(),todoItemId:null}); closeModal();await save();render();toast('已儲存工作')}
function v(id){return document.getElementById(id)?.value?.trim()||''}
async function completeTask(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;const before={...t};t.status='已完成';t.completedAt=fmtNow();syncTodoDone(t,true);if(t.projectId)addHistory(project(t.projectId),`完成工作：${t.title}`);await save();render();toast('已完成',()=>{Object.assign(t,before);syncTodoDone(t,false)})}
async function postponeTask(id,days){const t=state.tasks.find(x=>x.id===id);if(!t)return;const before={...t};const d=parseDate(t.date||today());d.setDate(d.getDate()+days);t.date=d.toISOString().slice(0,10);await save();render();toast('已延後',()=>Object.assign(t,before))}
async function deleteTask(id){const idx=state.tasks.findIndex(t=>t.id===id);if(idx<0)return;const old=state.tasks[idx];if(!confirm(`刪除工作：${old.title}？`))return;state.tasks.splice(idx,1);unlinkTaskFromTodos(id);await save();render();toast('已刪除工作',()=>state.tasks.splice(idx,0,old))}
function syncTodoDone(t,done){if(!t.todoItemId)return;for(const p of state.projects)for(const g of p.todos||[])for(const it of g.items||[])if(it.id===t.todoItemId)it.done=done}
function unlinkTaskFromTodos(id){for(const p of state.projects)for(const g of p.todos||[])for(const it of g.items||[])if(it.taskId===id)it.taskId=null}
function addHistory(p,msg){if(!p)return;p.history=p.history||[];p.history.push({time:fmtNow(),msg})}

async function addComment(pid){const p=project(pid), el=document.getElementById('commentText');const text=el.value.trim();if(!text)return; p.comments=p.comments||[]; p.comments.push({id:uid(),time:fmtNow(),text});el.value='';await save();render();toast('已新增留言')}
async function deleteComment(pid,cid){const p=project(pid), arr=p.comments||[], idx=arr.findIndex(c=>c.id===cid), old=arr[idx];if(idx<0)return;arr.splice(idx,1);await save();render();toast('已刪除留言',()=>arr.splice(idx,0,old))}
async function addTodoGroup(pid){const name=prompt('清單名稱');if(!name)return;project(pid).todos.push({id:uid(),name,items:[]});await save();render()}
async function renameTodoGroup(pid,gid){const g=project(pid).todos.find(x=>x.id===gid);const name=prompt('新的清單名稱',g.name);if(!name)return;g.name=name;await save();render()}
async function deleteTodoGroup(pid,gid){const p=project(pid), idx=p.todos.findIndex(g=>g.id===gid), old=p.todos[idx];if(idx<0)return;if(!confirm(`刪除清單「${old.name}」及 ${old.items.length} 個子項目？`))return;p.todos.splice(idx,1);await save();render();toast('已刪除清單',()=>p.todos.splice(idx,0,old))}
async function addTodoItem(pid,gid){const title=prompt('子項目內容');if(!title)return;project(pid).todos.find(g=>g.id===gid).items.push({id:uid(),title,done:false,taskId:null});await save();render()}
async function deleteTodoItem(pid,gid,iid){const g=project(pid).todos.find(g=>g.id===gid), idx=g.items.findIndex(i=>i.id===iid), old=g.items[idx];if(idx<0)return;g.items.splice(idx,1);await save();render();toast('已刪除子項目',()=>g.items.splice(idx,0,old))}
async function toggleTodo(pid,gid,iid,done){project(pid).todos.find(g=>g.id===gid).items.find(i=>i.id===iid).done=done;await save()}
async function editTodoText(pid,gid,iid,text){project(pid).todos.find(g=>g.id===gid).items.find(i=>i.id===iid).title=text.trim();await save()}
function scheduleTodo(pid,gid,iid){const p=project(pid), it=p.todos.find(g=>g.id===gid).items.find(i=>i.id===iid); if(it.taskId&&state.tasks.find(t=>t.id===it.taskId)){openTaskModal(it.taskId);return} const date=prompt('排程日期 YYYY-MM-DD',today()); if(!date)return; const t={id:uid(),projectId:pid,title:it.title,date,time:'',status:'未完成',todoItemId:iid,createdAt:new Date().toISOString()};state.tasks.push(t);it.taskId=t.id;save().then(()=>{render();toast('已建立工作排程')})}
function saveTemplate(pid){const p=project(pid);const name=prompt('範本名稱',p.course+' 檢查清單');if(!name)return;const data={id:uid(),name,sections:(p.todos||[]).map(g=>({name:g.name,items:(g.items||[]).map(i=>i.title)}))};const i=state.templates.findIndex(t=>t.name===name);if(i>=0){if(!confirm('同名範本已存在，是否覆蓋？'))return;state.templates[i]=data}else state.templates.push(data);save().then(()=>toast('已儲存範本'))}
function importTemplate(pid){if(!state.templates.length){toast('尚未有範本');return}const name=prompt('輸入要匯入的範本名稱：\n'+state.templates.map(t=>'- '+t.name).join('\n'));const tpl=state.templates.find(t=>t.name===name);if(!tpl)return;const p=project(pid);for(const sec of tpl.sections){let g=p.todos.find(x=>x.name===sec.name);if(!g){g={id:uid(),name:sec.name,items:[]};p.todos.push(g)}for(const title of sec.items)if(!g.items.some(i=>i.title===title))g.items.push({id:uid(),title,done:false,taskId:null})}save().then(()=>{render();toast('已匯入範本')})}

function batchIds(){return [...batchSelected]} async function batchComplete(){for(const id of batchIds()){const t=state.tasks.find(x=>x.id===id);if(t){t.status='已完成';t.completedAt=fmtNow();syncTodoDone(t,true)}}batchSelected.clear();await save();render();toast('已批次完成')}async function batchPostpone(days){for(const id of batchIds()){const t=state.tasks.find(x=>x.id===id);if(t){const d=parseDate(t.date||today());d.setDate(d.getDate()+days);t.date=d.toISOString().slice(0,10)}}batchSelected.clear();await save();render();toast('已批次延後')}async function batchWaiting(){for(const id of batchIds()){const t=state.tasks.find(x=>x.id===id);if(t)t.status='等待中'}batchSelected.clear();await save();render();toast('已設為等待中')}async function batchDelete(){if(!confirm(`刪除已選 ${batchSelected.size} 件工作？`))return;state.tasks=state.tasks.filter(t=>!batchSelected.has(t.id));batchSelected.clear();await save();render();toast('已批次刪除')}function todayClose(){state.settings.calendarFilter='今天';selectedDate=today();current='calendar';render();toast('已切到今天工作，請逐筆完成、延後或等待')}

function modal(html){document.getElementById('modalRoot').innerHTML=`<div class="modalBack" onclick="if(event.target.className==='modalBack')closeModal()"><div class="modal">${html}</div></div>`}function closeModal(){document.getElementById('modalRoot').innerHTML=''}
async function importFile(file){if(!file)return;try{const raw=JSON.parse(await file.text());state=migrateImported(raw);await save();render();toast('匯入完成')}catch(e){alert('匯入失敗：'+e.message)}}
function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`teacher_project_manager_web_backup_${today()}.json`;a.click();URL.revokeObjectURL(a.href)}
async function clearData(){if(!confirm('確定清空目前瀏覽器資料？請先匯出備份。'))return;state={version:'web-v1',settings:{monthlyGoal:2,fontScale:100,calendarCollapsed:false,calendarFilter:'全部',projectFilter:'全部'},projects:[],tasks:[],templates:[]};await save();render()}
(async function init(){const saved=await dbGet();if(saved) state={...state,...saved,settings:{...state.settings,...(saved.settings||{})}}; if(!state.projects.length){current='settings'}render()})();
</script>
